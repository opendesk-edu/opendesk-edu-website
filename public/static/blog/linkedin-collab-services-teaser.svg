<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>openDesk Edu - Collab Services (LinkedIn)</title>
  <desc>Branded teaser image for the openDesk Edu collab services LinkedIn article featuring a dark purple gradient background, tool icons, grid pattern, and article title.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="50%" stop-color="#0d0020"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </linearGradient>
    <linearGradient id="accentLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#571EFA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#571EFA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentRight" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#927AFA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#927AFA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#571EFA"/>
      <stop offset="100%" stop-color="#927AFA"/>
    </linearGradient>
    <filter id="glowWide" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#571EFA" stroke-width="0.5" opacity="0.06"/>
    </pattern>
    <pattern id="dotGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#927AFA" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#dotGrid)"/>

  <!-- Edge accents -->
  <rect x="0" y="0" width="200" height="630" fill="url(#accentLeft)"/>
  <rect x="1000" y="0" width="200" height="630" fill="url(#accentRight)"/>
  <rect x="0" y="0" width="1200" height="2" fill="#571EFA" opacity="0.4"/>
  <rect x="0" y="628" width="1200" height="2" fill="#927AFA" opacity="0.2"/>

  <!-- Ambient glow -->
  <ellipse cx="200" cy="315" rx="250" ry="250" fill="#571EFA" opacity="0.06" filter="url(#glowWide)"/>
  <ellipse cx="1000" cy="315" rx="200" ry="200" fill="#927AFA" opacity="0.04" filter="url(#glowWide)"/>

  <!-- Tool icon grid background decoration -->
  <g transform="translate(25, 60)" opacity="0.10">
    <rect x="15" y="20" width="35" height="35" rx="6" fill="#F37726"/>
    <text x="32" y="43" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="bold">J</text>
    <rect x="55" y="20" width="35" height="35" rx="6" fill="#47A138"/>
    <text x="72" y="43" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="bold">L</text>
    <rect x="15" y="60" width="35" height="35" rx="6" fill="#75AADB"/>
    <text x="32" y="83" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="bold">R</text>
    <rect x="55" y="60" width="35" height="35" rx="6" fill="#007ACC"/>
    <text x="72" y="83" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="bold">V</text>
    <rect x="35" y="100" width="35" height="35" rx="6" fill="#571EFA"/>
    <text x="52" y="123" text-anchor="middle" font-family="Arial" font-size="14" fill="white" font-weight="bold">O</text>
  </g>

  <!-- D Icon -->
  <g transform="translate(60, 130)">
    <rect x="0" y="0" width="110" height="110" rx="22" fill="url(#iconGrad)" opacity="0.9"/>
    <text x="55" y="82" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="76" font-weight="bold" fill="white" opacity="0.95">D</text>
  </g>

  <!-- Brand wordmark -->
  <text x="200" y="194" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="white" letter-spacing="2">openDesk</text>
  <text x="200" y="222" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="300" fill="#DDD6FE" letter-spacing="10">EDUCATION</text>
  <line x1="200" y1="236" x2="380" y2="236" stroke="#571EFA" stroke-width="1" opacity="0.4"/>

  <!-- Article category badge -->
  <rect x="200" y="260" width="90" height="28" rx="14" fill="#571EFA" opacity="0.25"/>
  <text x="245" y="279" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#927AFA" letter-spacing="1">LINKEDIN</text>

  <!-- Decorative line -->
  <line x1="200" y1="312" x2="950" y2="312" stroke="#571EFA" stroke-width="1.5" opacity="0.2"/>

  <!-- Article title -->
  <text x="200" y="340" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="white">
    <tspan x="200" dy="0">Collab Services</tspan>
    <tspan x="200" dy="38" fill="#DDD6FE" font-weight="400" font-size="22">Scientific Computing on openDesk Edu</tspan>
  </text>

  <!-- Short description -->
  <text x="200" y="420" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#927AFA" opacity="0.8">
    <tspan x="200" dy="0">11 open-source tools for research,</tspan>
    <tspan x="200" dy="22">integrated with Keycloak SSO.</tspan>
  </text>

  <!-- Tech tags -->
  <g transform="translate(200, 480)">
    <rect x="0" y="0" width="80" height="24" rx="12" fill="#571EFA" opacity="0.2"/>
    <text x="40" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">JupyterHub</text>
    <rect x="90" y="0" width="70" height="24" rx="12" fill="#571EFA" opacity="0.15"/>
    <text x="125" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">Overleaf</text>
    <rect x="170" y="0" width="70" height="24" rx="12" fill="#571EFA" opacity="0.15"/>
    <text x="205" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">RStudio</text>
    <rect x="250" y="0" width="95" height="24" rx="12" fill="#571EFA" opacity="0.15"/>
    <text x="297" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">code-server</text>
    <rect x="355" y="0" width="90" height="24" rx="12" fill="#571EFA" opacity="0.15"/>
    <text x="400" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">Open WebUI</text>
  </g>

  <!-- Bottom decoration -->
  <g opacity="0.06">
    <rect x="180" y="540" width="12" height="12" rx="2" fill="#F37726"/>
    <path d="M 196,546 L 210,546" stroke="#927AFA" stroke-width="1"/>
    <rect x="216" y="540" width="12" height="12" rx="2" fill="#47A138"/>
    <path d="M 232,546 L 246,546" stroke="#927AFA" stroke-width="1"/>
    <rect x="252" y="540" width="12" height="12" rx="2" fill="#007ACC"/>
    <path d="M 268,546 L 282,546" stroke="#927AFA" stroke-width="1"/>
    <rect x="288" y="540" width="12" height="12" rx="2" fill="#75AADB"/>
  </g>

  <!-- Decorative vertical lines -->
  <line x1="1000" y1="100" x2="1000" y2="530" stroke="#571EFA" stroke-width="0.5" opacity="0.06"/>
  <line x1="1050" y1="150" x2="1050" y2="500" stroke="#927AFA" stroke-width="0.5" opacity="0.05"/>
  <line x1="1100" y1="120" x2="1100" y2="480" stroke="#571EFA" stroke-width="0.5" opacity="0.04"/>

  <!-- Corner marks -->
  <path d="M 20,20 L 50,20 M 20,20 L 20,50" stroke="#571EFA" stroke-width="1.5" opacity="0.25" fill="none"/>
  <path d="M 1180,20 L 1150,20 M 1180,20 L 1180,50" stroke="#927AFA" stroke-width="1.5" opacity="0.2" fill="none"/>
  <path d="M 20,610 L 50,610 M 20,610 L 20,580" stroke="#571EFA" stroke-width="1.5" opacity="0.25" fill="none"/>
  <path d="M 1180,610 L 1150,610 M 1180,610 L 1180,580" stroke="#927AFA" stroke-width="1.5" opacity="0.2" fill="none"/>
</svg>
