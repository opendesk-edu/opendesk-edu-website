<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>openDesk Edu - Community of Practice</title>
  <desc>Branded teaser image for the openDesk Edu Community of Practice recap featuring a dark purple gradient background, people/network icon, grid pattern, and article title.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="50%" stop-color="#0d0020"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </linearGradient>
    <linearGradient id="accentLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#571EFA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#571EFA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentRight" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#927AFA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#927AFA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#571EFA"/>
      <stop offset="100%" stop-color="#927AFA"/>
    </linearGradient>
    <filter id="glowWide" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#571EFA" stroke-width="0.5" opacity="0.06"/>
    </pattern>
    <pattern id="dotGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#927AFA" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#dotGrid)"/>

  <!-- Edge accents -->
  <rect x="0" y="0" width="200" height="630" fill="url(#accentLeft)"/>
  <rect x="1000" y="0" width="200" height="630" fill="url(#accentRight)"/>
  <rect x="0" y="0" width="1200" height="2" fill="#571EFA" opacity="0.4"/>
  <rect x="0" y="628" width="1200" height="2" fill="#927AFA" opacity="0.2"/>

  <!-- Ambient glow -->
  <ellipse cx="200" cy="315" rx="250" ry="250" fill="#571EFA" opacity="0.06" filter="url(#glowWide)"/>
  <ellipse cx="1000" cy="315" rx="200" ry="200" fill="#927AFA" opacity="0.04" filter="url(#glowWide)"/>

  <!-- People/network background decoration -->
  <g transform="translate(25, 60)" opacity="0.10">
    <!-- Central person -->
    <circle cx="80" cy="50" r="12" fill="#571EFA"/>
    <circle cx="80" cy="50" r="6" fill="#927AFA"/>
    <!-- Connected people -->
    <line x1="92" y1="46" x2="120" y2="32" stroke="#571EFA" stroke-width="1.5"/>
    <circle cx="128" cy="28" r="10" fill="#571EFA"/>
    <circle cx="128" cy="28" r="5" fill="#927AFA"/>
    <line x1="92" y1="54" x2="120" y2="68" stroke="#571EFA" stroke-width="1.5"/>
    <circle cx="128" cy="72" r="10" fill="#571EFA"/>
    <circle cx="128" cy="72" r="5" fill="#927AFA"/>
    <line x1="68" y1="46" x2="40" y2="32" stroke="#927AFA" stroke-width="1.5"/>
    <circle cx="32" cy="28" r="10" fill="#927AFA"/>
    <circle cx="32" cy="28" r="5" fill="#571EFA"/>
    <line x1="68" y1="54" x2="40" y2="68" stroke="#927AFA" stroke-width="1.5"/>
    <circle cx="32" cy="72" r="10" fill="#927AFA"/>
    <circle cx="32" cy="72" r="5" fill="#571EFA"/>
    <!-- Outer connections -->
    <line x1="128" y1="24" x2="148" y2="14" stroke="#927AFA" stroke-width="1"/>
    <circle cx="155" cy="11" r="7" fill="#571EFA"/>
    <line x1="128" y1="76" x2="148" y2="86" stroke="#927AFA" stroke-width="1"/>
    <circle cx="155" cy="89" r="7" fill="#571EFA"/>
    <line x1="32" y1="24" x2="14" y2="14" stroke="#927AFA" stroke-width="1"/>
    <circle cx="7" cy="11" r="7" fill="#927AFA"/>
    <line x1="32" y1="76" x2="14" y2="86" stroke="#927AFA" stroke-width="1"/>
    <circle cx="7" cy="89" r="7" fill="#927AFA"/>
    <!-- Discussion bubbles -->
    <rect x="60" y="95" width="40" height="14" rx="7" fill="#571EFA"/>
    <polygon points="80,109 76,115 84,115" fill="#571EFA"/>
  </g>

  <!-- D Icon -->
  <g transform="translate(60, 130)">
    <rect x="0" y="0" width="110" height="110" rx="22" fill="url(#iconGrad)" opacity="0.9"/>
    <text x="55" y="82" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="76" font-weight="bold" fill="white" opacity="0.95">D</text>
  </g>

  <!-- Brand wordmark -->
  <text x="200" y="194" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="white" letter-spacing="2">openDesk</text>
  <text x="200" y="222" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="300" fill="#DDD6FE" letter-spacing="10">EDUCATION</text>
  <line x1="200" y1="236" x2="380" y2="236" stroke="#571EFA" stroke-width="1" opacity="0.4"/>

  <!-- Article category badge -->
  <rect x="200" y="260" width="140" height="28" rx="14" fill="#571EFA" opacity="0.25"/>
  <text x="270" y="279" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#927AFA" letter-spacing="1">COMMUNITY</text>

  <!-- Decorative line -->
  <line x1="200" y1="312" x2="950" y2="312" stroke="#571EFA" stroke-width="1.5" opacity="0.2"/>

  <!-- Article title -->
  <text x="200" y="340" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="white">
    <tspan x="200" dy="0">openDesk Community of Practice</tspan>
    <tspan x="200" dy="38" fill="#DDD6FE" font-weight="400" font-size="22">Cross-Institution Exchange</tspan>
  </text>

  <!-- Short description -->
  <text x="200" y="420" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#927AFA" opacity="0.8">
    <tspan x="200" dy="0">Session recap: ILIAS stabilization, roadmap,</tspan>
    <tspan x="200" dy="22">campus feedback, and upcoming topics.</tspan>
  </text>

  <!-- Tech tags -->
  <g transform="translate(200, 480)">
    <rect x="0" y="0" width="80" height="24" rx="12" fill="#571EFA" opacity="0.2"/>
    <text x="40" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">openDesk</text>
    <rect x="90" y="0" width="90" height="24" rx="12" fill="#571EFA" opacity="0.15"/>
    <text x="135" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">Community</text>
    <rect x="190" y="0" width="80" height="24" rx="12" fill="#571EFA" opacity="0.15"/>
    <text x="230" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">Campus</text>
    <rect x="280" y="0" width="80" height="24" rx="12" fill="#571EFA" opacity="0.15"/>
    <text x="320" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">Exchange</text>
  </g>

  <!-- Bottom decoration -->
  <g opacity="0.06">
    <circle cx="190" cy="546" r="5" fill="#571EFA"/>
    <circle cx="208" cy="546" r="5" fill="#927AFA"/>
    <path d="M 218,546 L 250,546" stroke="#927AFA" stroke-width="1"/>
    <circle cx="260" cy="546" r="5" fill="#571EFA"/>
    <circle cx="278" cy="546" r="5" fill="#927AFA"/>
    <path d="M 288,546 L 310,546" stroke="#927AFA" stroke-width="1"/>
    <circle cx="320" cy="546" r="5" fill="#571EFA"/>
  </g>

  <!-- Decorative vertical lines -->
  <line x1="1000" y1="100" x2="1000" y2="530" stroke="#571EFA" stroke-width="0.5" opacity="0.06"/>
  <line x1="1050" y1="150" x2="1050" y2="500" stroke="#927AFA" stroke-width="0.5" opacity="0.05"/>
  <line x1="1100" y1="120" x2="1100" y2="480" stroke="#571EFA" stroke-width="0.5" opacity="0.04"/>

  <!-- Corner marks -->
  <path d="M 20,20 L 50,20 M 20,20 L 20,50" stroke="#571EFA" stroke-width="1.5" opacity="0.25" fill="none"/>
  <path d="M 1180,20 L 1150,20 M 1180,20 L 1180,50" stroke="#927AFA" stroke-width="1.5" opacity="0.2" fill="none"/>
  <path d="M 20,610 L 50,610 M 20,610 L 20,580" stroke="#571EFA" stroke-width="1.5" opacity="0.25" fill="none"/>
  <path d="M 1180,610 L 1150,610 M 1180,610 L 1180,580" stroke="#927AFA" stroke-width="1.5" opacity="0.2" fill="none"/>
</svg>
