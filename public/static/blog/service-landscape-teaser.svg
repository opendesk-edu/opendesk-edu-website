<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>openDesk Edu - Service Landscape</title>
  <desc>Branded teaser image for the openDesk Edu service landscape article featuring a dark purple gradient background, ecosystem grid visualization, grid pattern, and article title.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="50%" stop-color="#0d0020"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </linearGradient>
    <linearGradient id="accentLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#571EFA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#571EFA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentRight" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#927AFA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#927AFA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#571EFA"/>
      <stop offset="100%" stop-color="#927AFA"/>
    </linearGradient>
    <filter id="glowWide" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#571EFA" stroke-width="0.5" opacity="0.06"/>
    </pattern>
    <pattern id="dotGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#927AFA" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#dotGrid)"/>

  <!-- Edge accents -->
  <rect x="0" y="0" width="200" height="630" fill="url(#accentLeft)"/>
  <rect x="1000" y="0" width="200" height="630" fill="url(#accentRight)"/>
  <rect x="0" y="0" width="1200" height="2" fill="#571EFA" opacity="0.4"/>
  <rect x="0" y="628" width="1200" height="2" fill="#927AFA" opacity="0.2"/>

  <!-- Ambient glow -->
  <ellipse cx="200" cy="315" rx="250" ry="250" fill="#571EFA" opacity="0.06" filter="url(#glowWide)"/>
  <ellipse cx="1000" cy="315" rx="200" ry="200" fill="#927AFA" opacity="0.04" filter="url(#glowWide)"/>

  <!-- Ecosystem grid background decoration -->
  <g transform="translate(20, 55)" opacity="0.10">
    <!-- Domain boxes -->
    <rect x="10" y="15" width="50" height="18" rx="3" fill="#571EFA"/>
    <text x="35" y="28" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Core</text>
    <rect x="65" y="15" width="50" height="18" rx="3" fill="#22c55e"/>
    <text x="90" y="28" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Education</text>
    <rect x="10" y="38" width="50" height="18" rx="3" fill="#3b82f6"/>
    <text x="35" y="51" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Collab</text>
    <rect x="65" y="38" width="50" height="18" rx="3" fill="#f59e0b"/>
    <text x="90" y="51" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Science</text>
    <rect x="10" y="61" width="50" height="18" rx="3" fill="#ef4444"/>
    <text x="35" y="74" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Security</text>
    <rect x="65" y="61" width="50" height="18" rx="3" fill="#927AFA"/>
    <text x="90" y="74" text-anchor="middle" font-family="Arial" font-size="7" fill="white">Productivity</text>
    <!-- Service dots -->
    <g transform="translate(10, 88)">
      <circle cx="5" cy="5" r="3" fill="#571EFA"/>
      <circle cx="15" cy="5" r="3" fill="#571EFA"/>
      <circle cx="25" cy="5" r="3" fill="#571EFA"/>
      <circle cx="35" cy="5" r="3" fill="#571EFA"/>
      <circle cx="45" cy="5" r="3" fill="#571EFA"/>
      <circle cx="55" cy="5" r="3" fill="#22c55e"/>
      <circle cx="65" cy="5" r="3" fill="#22c55e"/>
      <circle cx="75" cy="5" r="3" fill="#22c55e"/>
      <circle cx="85" cy="5" r="3" fill="#22c55e"/>
      <circle cx="95" cy="5" r="3" fill="#22c55e"/>
      <circle cx="5" cy="18" r="3" fill="#3b82f6"/>
      <circle cx="15" cy="18" r="3" fill="#3b82f6"/>
      <circle cx="25" cy="18" r="3" fill="#3b82f6"/>
      <circle cx="35" cy="18" r="3" fill="#f59e0b"/>
      <circle cx="45" cy="18" r="3" fill="#f59e0b"/>
      <circle cx="55" cy="18" r="3" fill="#f59e0b"/>
      <circle cx="65" cy="18" r="3" fill="#927AFA"/>
      <circle cx="75" cy="18" r="3" fill="#927AFA"/>
      <circle cx="85" cy="18" r="3" fill="#927AFA"/>
      <circle cx="95" cy="18" r="3" fill="#927AFA"/>
    </g>
  </g>

  <!-- D Icon -->
  <g transform="translate(60, 130)">
    <rect x="0" y="0" width="110" height="110" rx="22" fill="url(#iconGrad)" opacity="0.9"/>
    <text x="55" y="82" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="76" font-weight="bold" fill="white" opacity="0.95">D</text>
  </g>

  <!-- Brand wordmark -->
  <text x="200" y="194" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="white" letter-spacing="2">openDesk</text>
  <text x="200" y="222" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="300" fill="#DDD6FE" letter-spacing="10">EDUCATION</text>
  <line x1="200" y1="236" x2="380" y2="236" stroke="#571EFA" stroke-width="1" opacity="0.4"/>

  <!-- Article category badge -->
  <rect x="200" y="260" width="110" height="28" rx="14" fill="#571EFA" opacity="0.25"/>
  <text x="255" y="279" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#927AFA" letter-spacing="1">PLATFORM</text>

  <!-- Decorative line -->
  <line x1="200" y1="312" x2="950" y2="312" stroke="#571EFA" stroke-width="1.5" opacity="0.2"/>

  <!-- Article title -->
  <text x="200" y="340" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="white">
    <tspan x="200" dy="0">openDesk Edu Service Landscape</tspan>
    <tspan x="200" dy="38" fill="#DDD6FE" font-weight="400" font-size="22">Your Complete Ecosystem at a Glance</tspan>
  </text>

  <!-- Short description -->
  <text x="200" y="420" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#927AFA" opacity="0.8">
    <tspan x="200" dy="0">Interactive map of all integrated open-source</tspan>
    <tspan x="200" dy="22">services across domains and categories.</tspan>
  </text>

  <!-- Tech tags -->
  <g transform="translate(200, 480)">
    <rect x="0" y="0" width="90" height="24" rx="12" fill="#571EFA" opacity="0.2"/>
    <text x="45" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">Landscape</text>
    <rect x="100" y="0" width="80" height="24" rx="12" fill="#571EFA" opacity="0.15"/>
    <text x="140" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">Ecosystem</text>
    <rect x="190" y="0" width="80" height="24" rx="12" fill="#571EFA" opacity="0.15"/>
    <text x="230" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">Services</text>
    <rect x="280" y="0" width="85" height="24" rx="12" fill="#571EFA" opacity="0.15"/>
    <text x="322" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">openDesk</text>
  </g>

  <!-- Bottom decoration -->
  <g opacity="0.06">
    <circle cx="190" cy="546" r="4" fill="#571EFA"/>
    <circle cx="204" cy="546" r="4" fill="#22c55e"/>
    <circle cx="218" cy="546" r="4" fill="#3b82f6"/>
    <circle cx="232" cy="546" r="4" fill="#f59e0b"/>
    <circle cx="246" cy="546" r="4" fill="#927AFA"/>
    <circle cx="260" cy="546" r="4" fill="#ef4444"/>
    <circle cx="274" cy="546" r="4" fill="#571EFA"/>
    <circle cx="288" cy="546" r="4" fill="#22c55e"/>
  </g>

  <!-- Decorative vertical lines -->
  <line x1="1000" y1="100" x2="1000" y2="530" stroke="#571EFA" stroke-width="0.5" opacity="0.06"/>
  <line x1="1050" y1="150" x2="1050" y2="500" stroke="#927AFA" stroke-width="0.5" opacity="0.05"/>
  <line x1="1100" y1="120" x2="1100" y2="480" stroke="#571EFA" stroke-width="0.5" opacity="0.04"/>

  <!-- Corner marks -->
  <path d="M 20,20 L 50,20 M 20,20 L 20,50" stroke="#571EFA" stroke-width="1.5" opacity="0.25" fill="none"/>
  <path d="M 1180,20 L 1150,20 M 1180,20 L 1180,50" stroke="#927AFA" stroke-width="1.5" opacity="0.2" fill="none"/>
  <path d="M 20,610 L 50,610 M 20,610 L 20,580" stroke="#571EFA" stroke-width="1.5" opacity="0.25" fill="none"/>
  <path d="M 1180,610 L 1150,610 M 1180,610 L 1180,580" stroke="#927AFA" stroke-width="1.5" opacity="0.2" fill="none"/>
</svg>
