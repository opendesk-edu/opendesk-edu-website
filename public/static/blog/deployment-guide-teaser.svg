<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>openDesk Edu - Deployment Guide</title>
  <desc>Branded teaser image for the openDesk Edu deployment guide featuring a dark purple gradient background, terminal/deployment icon, grid pattern, and article title.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="50%" stop-color="#0d0020"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </linearGradient>
    <linearGradient id="accentLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#571EFA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#571EFA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentRight" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#927AFA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#927AFA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#571EFA"/>
      <stop offset="100%" stop-color="#927AFA"/>
    </linearGradient>
    <filter id="glowWide" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#571EFA" stroke-width="0.5" opacity="0.06"/>
    </pattern>
    <pattern id="dotGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#927AFA" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#dotGrid)"/>

  <!-- Edge accents -->
  <rect x="0" y="0" width="200" height="630" fill="url(#accentLeft)"/>
  <rect x="1000" y="0" width="200" height="630" fill="url(#accentRight)"/>
  <rect x="0" y="0" width="1200" height="2" fill="#571EFA" opacity="0.4"/>
  <rect x="0" y="628" width="1200" height="2" fill="#927AFA" opacity="0.2"/>

  <!-- Ambient glow -->
  <ellipse cx="200" cy="315" rx="250" ry="250" fill="#571EFA" opacity="0.06" filter="url(#glowWide)"/>
  <ellipse cx="1000" cy="315" rx="200" ry="200" fill="#927AFA" opacity="0.04" filter="url(#glowWide)"/>

  <!-- Terminal/deployment background decoration -->
  <g transform="translate(30, 70)" opacity="0.10">
    <rect x="20" y="30" width="120" height="80" rx="6" fill="none" stroke="#22c55e" stroke-width="2"/>
    <rect x="20" y="30" width="120" height="18" rx="6" fill="#571EFA"/>
    <circle cx="32" cy="39" r="4" fill="#ef4444"/>
    <circle cx="44" cy="39" r="4" fill="#f59e0b"/>
    <circle cx="56" cy="39" r="4" fill="#22c55e"/>
    <text x="80" y="42" text-anchor="middle" font-family="monospace" font-size="8" fill="white">terminal</text>
    <text x="30" y="62" font-family="monospace" font-size="7" fill="#22c55e">$ helmfile apply</text>
    <text x="30" y="74" font-family="monospace" font-size="7" fill="#927AFA">Pulling 30 charts...</text>
    <text x="30" y="86" font-family="monospace" font-size="7" fill="#22c55e">✓ Sync complete</text>
    <text x="30" y="98" font-family="monospace" font-size="7" fill="#927AFA">Deploying to k8s...</text>
  </g>

  <!-- D Icon -->
  <g transform="translate(60, 130)">
    <rect x="0" y="0" width="110" height="110" rx="22" fill="url(#iconGrad)" opacity="0.9"/>
    <text x="55" y="82" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="76" font-weight="bold" fill="white" opacity="0.95">D</text>
  </g>

  <!-- Brand wordmark -->
  <text x="200" y="194" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="white" letter-spacing="2">openDesk</text>
  <text x="200" y="222" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="300" fill="#DDD6FE" letter-spacing="10">EDUCATION</text>
  <line x1="200" y1="236" x2="380" y2="236" stroke="#571EFA" stroke-width="1" opacity="0.4"/>

  <!-- Article category badge -->
  <rect x="200" y="260" width="110" height="28" rx="14" fill="#571EFA" opacity="0.25"/>
  <text x="255" y="279" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#927AFA" letter-spacing="1">TUTORIAL</text>

  <!-- Decorative line -->
  <line x1="200" y1="312" x2="950" y2="312" stroke="#571EFA" stroke-width="1.5" opacity="0.2"/>

  <!-- Article title -->
  <text x="200" y="340" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="white">
    <tspan x="200" dy="0">Deployment Guide</tspan>
    <tspan x="200" dy="38" fill="#DDD6FE" font-weight="400" font-size="22">Deploy openDesk Edu on Kubernetes</tspan>
  </text>

  <!-- Short description -->
  <text x="200" y="420" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#927AFA" opacity="0.8">
    <tspan x="200" dy="0">Step-by-step from cluster setup to federation</tspan>
    <tspan x="200" dy="22">configuration with DFN-AAI and eduGAIN.</tspan>
  </text>

  <!-- Tech tags -->
  <g transform="translate(200, 480)">
    <rect x="0" y="0" width="60" height="24" rx="12" fill="#571EFA" opacity="0.2"/>
    <text x="30" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">Helm</text>
    <rect x="70" y="0" width="85" height="24" rx="12" fill="#571EFA" opacity="0.15"/>
    <text x="112" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">Helmfile</text>
    <rect x="165" y="0" width="90" height="24" rx="12" fill="#571EFA" opacity="0.15"/>
    <text x="210" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">Keycloak</text>
    <rect x="265" y="0" width="110" height="24" rx="12" fill="#571EFA" opacity="0.15"/>
    <text x="320" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">Kubernetes</text>
    <rect x="385" y="0" width="55" height="24" rx="12" fill="#571EFA" opacity="0.15"/>
    <text x="412" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">SAML</text>
  </g>

  <!-- Bottom decoration -->
  <g opacity="0.06">
    <text x="190" y="553" font-family="monospace" font-size="10" fill="#22c55e">$</text>
    <path d="M 200,548 L 250,548" stroke="#927AFA" stroke-width="1"/>
    <rect x="256" y="540" width="30" height="16" rx="3" fill="#571EFA"/>
    <path d="M 290,548 L 330,548" stroke="#927AFA" stroke-width="1"/>
    <rect x="336" y="540" width="20" height="16" rx="3" fill="#22c55e"/>
  </g>

  <!-- Decorative vertical lines -->
  <line x1="1000" y1="100" x2="1000" y2="530" stroke="#571EFA" stroke-width="0.5" opacity="0.06"/>
  <line x1="1050" y1="150" x2="1050" y2="500" stroke="#927AFA" stroke-width="0.5" opacity="0.05"/>
  <line x1="1100" y1="120" x2="1100" y2="480" stroke="#571EFA" stroke-width="0.5" opacity="0.04"/>

  <!-- Corner marks -->
  <path d="M 20,20 L 50,20 M 20,20 L 20,50" stroke="#571EFA" stroke-width="1.5" opacity="0.25" fill="none"/>
  <path d="M 1180,20 L 1150,20 M 1180,20 L 1180,50" stroke="#927AFA" stroke-width="1.5" opacity="0.2" fill="none"/>
  <path d="M 20,610 L 50,610 M 20,610 L 20,580" stroke="#571EFA" stroke-width="1.5" opacity="0.25" fill="none"/>
  <path d="M 1180,610 L 1150,610 M 1180,610 L 1180,580" stroke="#927AFA" stroke-width="1.5" opacity="0.2" fill="none"/>
</svg>
