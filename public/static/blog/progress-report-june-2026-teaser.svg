<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="50%" stop-color="#0d0020"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#571EFA"/>
      <stop offset="100%" stop-color="#927AFA"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0a30" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#120824" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="ambarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glowWide" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <filter id="glowSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowBox">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="edgeLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#571EFA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#571EFA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="edgeRight" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#927AFA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#927AFA" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#571EFA" stroke-width="0.5" opacity="0.06"/>
    </pattern>
    <pattern id="dotGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#927AFA" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#dotGrid)"/>

  <!-- Edge accents -->
  <rect x="0" y="0" width="250" height="630" fill="url(#edgeLeft)"/>
  <rect x="950" y="0" width="250" height="630" fill="url(#edgeRight)"/>
  <rect x="0" y="0" width="1200" height="2" fill="#571EFA" opacity="0.35"/>
  <rect x="0" y="628" width="1200" height="2" fill="#927AFA" opacity="0.2"/>

  <!-- Ambient glow -->
  <ellipse cx="200" cy="315" rx="300" ry="250" fill="#571EFA" opacity="0.06" filter="url(#glowWide)"/>
  <ellipse cx="1000" cy="315" rx="250" ry="250" fill="#927AFA" opacity="0.04" filter="url(#glowWide)"/>

  <!-- Corner accents -->
  <path d="M 15,15 L 45,15 M 15,15 L 15,45" stroke="#571EFA" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M 1185,15 L 1155,15 M 1185,15 L 1185,45" stroke="#927AFA" stroke-width="1.5" opacity="0.2" fill="none"/>
  <path d="M 15,615 L 45,615 M 15,615 L 15,585" stroke="#571EFA" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M 1185,615 L 1155,615 M 1185,615 L 1185,585" stroke="#927AFA" stroke-width="1.5" opacity="0.2" fill="none"/>

  <!-- ============ CLUSTER VISUALIZATION ============ -->

  <!-- 3 server rack illustrations on the left side -->

  <!-- Rack 1: Master node -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="100" height="240" rx="6" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.3"/>
    <!-- Rack label -->
    <text x="50" y="-8" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#927AFA" font-weight="600" letter-spacing="1">MASTER</text>
    <!-- Server units -->
    <rect x="8" y="10" width="84" height="24" rx="3" fill="#571EFA" opacity="0.2"/>
    <rect x="8" y="40" width="84" height="24" rx="3" fill="#571EFA" opacity="0.2"/>
    <rect x="8" y="70" width="84" height="24" rx="3" fill="#571EFA" opacity="0.2"/>
    <!-- Pod health dots -->
    <circle cx="20" cy="22" r="3" fill="#22c55e" opacity="0.8"/>
    <circle cx="40" cy="22" r="3" fill="#22c55e" opacity="0.8"/>
    <circle cx="60" cy="22" r="3" fill="#22c55e" opacity="0.8"/>
    <circle cx="20" cy="52" r="3" fill="#22c55e" opacity="0.8"/>
    <circle cx="40" cy="52" r="3" fill="#22c55e" opacity="0.8"/>
    <circle cx="60" cy="52" r="3" fill="#22c55e" opacity="0.8"/>
    <circle cx="20" cy="82" r="3" fill="#22c55e" opacity="0.8"/>
    <circle cx="40" cy="82" r="3" fill="#22c55e" opacity="0.8"/>
    <circle cx="60" cy="82" r="3" fill="#22c55e" opacity="0.8"/>
    <!-- Status bar -->
    <rect x="8" y="105" width="84" height="4" rx="2" fill="#22c55e" opacity="0.3"/>
    <rect x="8" y="105" width="84" height="4" rx="2" fill="url(#greenGrad)" opacity="0.7"/>
    <!-- Labels -->
    <text x="50" y="130" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#DDD6FE" font-weight="500">3 CP nodes</text>
    <!-- Network lines down -->
    <line x1="50" y1="140" x2="50" y2="200" stroke="#927AFA" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>
    <circle cx="50" cy="200" r="4" fill="url(#iconGrad)" opacity="0.6"/>
    <line x1="50" y1="200" x2="50" y2="230" stroke="#927AFA" stroke-width="1" opacity="0.3" stroke-dasharray="3 3"/>
  </g>

  <!-- Rack 2: Worker nodes (middle, more prominent) -->
  <g transform="translate(190, 80)">
    <rect x="0" y="0" width="120" height="240" rx="6" fill="url(#cardGrad)" stroke="#927AFA" stroke-width="1" stroke-opacity="0.25"/>
    <text x="60" y="-8" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#927AFA" font-weight="600" letter-spacing="1">WORKERS</text>
    <!-- 6 worker nodes shown as compact blocks -->
    <rect x="8" y="10" width="104" height="30" rx="3" fill="#1a0a30" stroke="#571EFA" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="16" y="29" font-family="monospace" font-size="9" fill="#22c55e">●</text>
    <text x="28" y="29" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#DDD6FE">node-1</text>
    <rect x="80" y="14" width="26" height="6" rx="2" fill="#22c55e" opacity="0.5"/>

    <rect x="8" y="44" width="104" height="30" rx="3" fill="#1a0a30" stroke="#571EFA" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="16" y="63" font-family="monospace" font-size="9" fill="#22c55e">●</text>
    <text x="28" y="63" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#DDD6FE">node-2</text>
    <rect x="80" y="48" width="26" height="6" rx="2" fill="#22c55e" opacity="0.5"/>

    <rect x="8" y="78" width="104" height="30" rx="3" fill="#1a0a30" stroke="#571EFA" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="16" y="97" font-family="monospace" font-size="9" fill="#22c55e">●</text>
    <text x="28" y="97" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#DDD6FE">node-3</text>
    <rect x="80" y="82" width="26" height="6" rx="2" fill="#22c55e" opacity="0.5"/>

    <rect x="8" y="112" width="104" height="30" rx="3" fill="#1a0a30" stroke="#571EFA" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="16" y="131" font-family="monospace" font-size="9" fill="#22c55e">●</text>
    <text x="28" y="131" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#DDD6FE">node-4</text>
    <rect x="80" y="116" width="26" height="6" rx="2" fill="#22c55e" opacity="0.5"/>

    <rect x="8" y="146" width="104" height="30" rx="3" fill="#1a0a30" stroke="#571EFA" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="16" y="165" font-family="monospace" font-size="9" fill="#22c55e">●</text>
    <text x="28" y="165" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#DDD6FE">node-5</text>
    <rect x="80" y="150" width="26" height="6" rx="2" fill="#22c55e" opacity="0.5"/>

    <rect x="8" y="180" width="104" height="30" rx="3" fill="#1a0a30" stroke="#571EFA" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="16" y="199" font-family="monospace" font-size="9" fill="#22c55e">●</text>
    <text x="28" y="199" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#DDD6FE">node-6</text>
    <rect x="80" y="184" width="26" height="6" rx="2" fill="#22c55e" opacity="0.5"/>

    <!-- Status labels -->
    <text x="60" y="228" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#DDD6FE" font-weight="500">6 worker nodes</text>
  </g>

  <!-- Rack 3: Services running -->
  <g transform="translate(340, 80)">
    <rect x="0" y="0" width="110" height="240" rx="6" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.3"/>
    <text x="55" y="-8" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#927AFA" font-weight="600" letter-spacing="1">SERVICES</text>
    <!-- Running service indicators -->
    <g transform="translate(8, 10)">
      <rect x="0" y="0" width="94" height="20" rx="3" fill="#22c55e" opacity="0.1"/>
      <text x="6" y="14" font-family="monospace" font-size="8" fill="#22c55e">●</text>
      <text x="16" y="14" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#DDD6FE">Moodle LMS</text>
    </g>
    <g transform="translate(8, 34)">
      <rect x="0" y="0" width="94" height="20" rx="3" fill="#22c55e" opacity="0.1"/>
      <text x="6" y="14" font-family="monospace" font-size="8" fill="#22c55e">●</text>
      <text x="16" y="14" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#DDD6FE">ILIAS LMS</text>
    </g>
    <g transform="translate(8, 58)">
      <rect x="0" y="0" width="94" height="20" rx="3" fill="#22c55e" opacity="0.1"/>
      <text x="6" y="14" font-family="monospace" font-size="8" fill="#22c55e">●</text>
      <text x="16" y="14" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#DDD6FE">Nextcloud</text>
    </g>
    <g transform="translate(8, 82)">
      <rect x="0" y="0" width="94" height="20" rx="3" fill="#22c55e" opacity="0.1"/>
      <text x="6" y="14" font-family="monospace" font-size="8" fill="#22c55e">●</text>
      <text x="16" y="14" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#DDD6FE">Keycloak SSO</text>
    </g>
    <g transform="translate(8, 106)">
      <rect x="0" y="0" width="94" height="20" rx="3" fill="#22c55e" opacity="0.1"/>
      <text x="6" y="14" font-family="monospace" font-size="8" fill="#22c55e">●</text>
      <text x="16" y="14" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#DDD6FE">JupyterHub</text>
    </g>
    <g transform="translate(8, 130)">
      <rect x="0" y="0" width="94" height="20" rx="3" fill="#22c55e" opacity="0.1"/>
      <text x="6" y="14" font-family="monospace" font-size="8" fill="#22c55e">●</text>
      <text x="16" y="14" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#DDD6FE">Element Chat</text>
    </g>
    <g transform="translate(8, 154)">
      <rect x="0" y="0" width="94" height="20" rx="3" fill="#22c55e" opacity="0.1"/>
      <text x="6" y="14" font-family="monospace" font-size="8" fill="#22c55e">●</text>
      <text x="16" y="14" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#DDD6FE">Jitsi Meet</text>
    </g>
    <g transform="translate(8, 178)">
      <rect x="0" y="0" width="94" height="20" rx="3" fill="#22c55e" opacity="0.1"/>
      <text x="6" y="14" font-family="monospace" font-size="8" fill="#22c55e">●</text>
      <text x="16" y="14" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#DDD6FE">+24 more...</text>
    </g>
    <text x="55" y="228" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#DDD6FE" font-weight="500">33 services</text>
  </g>

  <!-- ============ METRIC CARDS ON RIGHT ============ -->

  <!-- Metric: 57 pods -->
  <g transform="translate(490, 80)">
    <rect width="200" height="65" rx="10" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.3"/>
    <rect x="2" y="2" width="196" height="61" rx="8" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="16" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="white" filter="url(#glowBox)">57</text>
    <text x="70" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">Pods running</text>
    <text x="70" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#927AFA">All healthy ✅</text>
    <!-- Mini pod icon -->
    <rect x="168" y="12" width="22" height="22" rx="5" fill="url(#greenGrad)" opacity="0.85"/>
    <rect x="172" y="16" width="6" height="14" rx="1" fill="white" opacity="0.3"/>
    <rect x="180" y="16" width="6" height="14" rx="1" fill="white" opacity="0.3"/>
  </g>

  <!-- Metric: 33 SSO -->
  <g transform="translate(490, 155)">
    <rect width="200" height="65" rx="10" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.3"/>
    <rect x="2" y="2" width="196" height="61" rx="8" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="16" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="white" filter="url(#glowBox)">33</text>
    <text x="70" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">Unified SSO</text>
    <text x="70" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#927AFA">Keycloak OIDC + SAML</text>
    <!-- Shield icon -->
    <circle cx="179" cy="32" r="12" fill="url(#iconGrad)" opacity="0.85"/>
    <path d="M179 24 L186 28 L186 34 Q186 38 179 40 Q172 38 172 34 L172 28Z" fill="white" opacity="0.5"/>
  </g>

  <!-- Metric: 44 clients -->
  <g transform="translate(490, 230)">
    <rect width="200" height="65" rx="10" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.3"/>
    <rect x="2" y="2" width="196" height="61" rx="8" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="16" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="white" filter="url(#glowBox)">44</text>
    <text x="70" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">Keycloak clients</text>
    <text x="70" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#927AFA">Audited &amp; migrated</text>
    <!-- Checkmark icon -->
    <circle cx="179" cy="32" r="12" fill="url(#blueGrad)" opacity="0.85"/>
    <path d="M173 32 L177 36 L185 28" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Metric: k8up/daily -->
  <g transform="translate(490, 305)">
    <rect width="200" height="65" rx="10" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.3"/>
    <rect x="2" y="2" width="196" height="61" rx="8" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="16" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="700" fill="white" filter="url(#glowBox)">k8up</text>
    <text x="70" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">Daily backups</text>
    <text x="70" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#927AFA">33 snapshots · 14d retention</text>
    <!-- Backup/database icon -->
    <rect x="168" y="14" width="22" height="18" rx="4" fill="url(#ambarGrad)" opacity="0.85"/>
    <rect x="168" y="14" width="22" height="6" rx="2" fill="white" opacity="0.3"/>
    <rect x="172" y="24" width="4" height="4" rx="1" fill="white" opacity="0.5"/>
    <rect x="180" y="24" width="4" height="4" rx="1" fill="white" opacity="0.5"/>
    <rect x="176" y="30" width="8" height="14" rx="1" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- ============ HEADLINE ============ -->

  <g transform="translate(490, 400)">
    <!-- openDesk Edu brand mark -->
    <g transform="translate(0, 0)" filter="url(#glowSoft)">
      <rect x="0" y="0" width="44" height="44" rx="10" fill="url(#iconGrad)"/>
      <text x="22" y="31" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="bold" fill="white">D</text>
    </g>

    <!-- Headline -->
    <text x="58" y="30" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="white" letter-spacing="1" filter="url(#glowSoft)">Progress Report</text>

    <!-- Subtitle -->
    <text x="58" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="400" fill="#927AFA" letter-spacing="0.5" opacity="0.85">Sprints 5–6 Operational Hardening</text>

    <!-- Separator -->
    <line x1="0" y1="70" x2="400" y2="70" stroke="#571EFA" stroke-width="1" opacity="0.4"/>

    <!-- Tagline -->
    <text x="0" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="400" fill="#DDD6FE" letter-spacing="0.5" opacity="0.7">K3s v1.32.3 · 9 nodes · Ceph RBD/CephFS · HAProxy ingress</text>
    <text x="0" y="118" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="400" fill="#DDD6FE" letter-spacing="0.5" opacity="0.7">SSO audit · Domain migration · Service repairs</text>

    <!-- Status badges -->
    <rect x="0" y="135" width="68" height="22" rx="11" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
    <text x="34" y="150" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#22c55e" font-weight="600" opacity="0.7">ALL OK</text>

    <rect x="78" y="135" width="80" height="22" rx="11" fill="none" stroke="#927AFA" stroke-width="1.5" opacity="0.4"/>
    <text x="118" y="150" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#927AFA" font-weight="600" opacity="0.7">UPSTREAMED</text>

    <rect x="168" y="135" width="50" height="22" rx="11" fill="none" stroke="#571EFA" stroke-width="1.5" opacity="0.4"/>
    <text x="193" y="150" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#571EFA" font-weight="600" opacity="0.7">K3s</text>
  </g>

  <!-- openDesk wordmark bottom-right -->
  <g transform="translate(890, 570)">
    <text x="0" y="0" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="white" letter-spacing="2" opacity="0.5">openDesk</text>
    <text x="107" y="0" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="20" font-weight="300" fill="#927AFA" letter-spacing="5" opacity="0.5">EDU</text>
  </g>
</svg>
