<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="50%" stop-color="#0d0020"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#571EFA"/>
      <stop offset="100%" stop-color="#927AFA"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0a30" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#120824" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="ambarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glowWide" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <filter id="glowSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowBox">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="edgeLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#571EFA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#571EFA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="edgeRight" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#927AFA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#927AFA" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#571EFA" stroke-width="0.5" opacity="0.06"/>
    </pattern>
    <pattern id="dotGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#927AFA" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#dotGrid)"/>

  <!-- Edge accents -->
  <rect x="0" y="0" width="250" height="630" fill="url(#edgeLeft)"/>
  <rect x="950" y="0" width="250" height="630" fill="url(#edgeRight)"/>
  <rect x="0" y="0" width="1200" height="2" fill="#571EFA" opacity="0.35"/>
  <rect x="0" y="628" width="1200" height="2" fill="#927AFA" opacity="0.2"/>

  <!-- Ambient glow -->
  <ellipse cx="200" cy="315" rx="300" ry="250" fill="#571EFA" opacity="0.06" filter="url(#glowWide)"/>
  <ellipse cx="1000" cy="315" rx="250" ry="250" fill="#927AFA" opacity="0.04" filter="url(#glowWide)"/>

  <!-- Corner accents -->
  <path d="M 15,15 L 45,15 M 15,15 L 15,45" stroke="#571EFA" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M 1185,15 L 1155,15 M 1185,15 L 1185,45" stroke="#927AFA" stroke-width="1.5" opacity="0.2" fill="none"/>
  <path d="M 15,615 L 45,615 M 15,615 L 15,585" stroke="#571EFA" stroke-width="1.5" opacity="0.3" fill="none"/>
  <path d="M 1185,615 L 1155,615 M 1185,615 L 1185,585" stroke="#927AFA" stroke-width="1.5" opacity="0.2" fill="none"/>

  <!-- ============ LEFT: MAUI CLUSTER VISUAL ============ -->

  <!-- Cluster rack icon -->
  <g transform="translate(60, 60)">
    <!-- Central server rack -->
    <rect x="20" y="0" width="140" height="310" rx="8" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.35"/>
    <text x="90" y="-10" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#927AFA" font-weight="600" letter-spacing="1.5">MAUI CLUSTER</text>

    <!-- Node row 1 -->
    <rect x="30" y="12" width="120" height="26" rx="4" fill="#1a0a30" stroke="#571EFA" stroke-width="0.5" stroke-opacity="0.35"/>
    <circle cx="42" cy="25" r="5" fill="#22c55e" opacity="0.7"/>
    <text x="54" y="29" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#DDD6FE">Control Plane (3x)</text>
    <rect x="118" y="33" width="32" height="3" rx="1.5" fill="url(#greenGrad)" opacity="0.6"/>

    <!-- Node row 2 -->
    <rect x="30" y="44" width="120" height="26" rx="4" fill="#1a0a30" stroke="#571EFA" stroke-width="0.5" stroke-opacity="0.35"/>
    <circle cx="42" cy="57" r="5" fill="#22c55e" opacity="0.7"/>
    <text x="54" y="61" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#DDD6FE">Worker Nodes (6x)</text>
    <rect x="118" y="65" width="32" height="3" rx="1.5" fill="url(#greenGrad)" opacity="0.6"/>

    <!-- Separator -->
    <line x1="30" y1="82" x2="150" y2="82" stroke="#927AFA" stroke-width="0.5" opacity="0.2"/>

    <!-- Service list -->
    <g transform="translate(30, 92)">
      <text x="0" y="10" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#DDD6FE">slidev Pending PVC</text>
      <rect x="86" y="2" width="34" height="12" rx="6" fill="#f59e0b" opacity="0.2"/>
      <text x="103" y="11" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="7" fill="#f59e0b" font-weight="600">FIXED</text>
    </g>
    <g transform="translate(30, 112)">
      <text x="0" y="10" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#DDD6FE">SOGo in demo NS</text>
      <rect x="86" y="2" width="34" height="12" rx="6" fill="#f59e0b" opacity="0.2"/>
      <text x="103" y="11" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="7" fill="#f59e0b" font-weight="600">FIXED</text>
    </g>
    <g transform="translate(30, 132)">
      <text x="0" y="10" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#DDD6FE">Storage Class audit</text>
      <rect x="86" y="2" width="34" height="12" rx="6" fill="#22c55e" opacity="0.2"/>
      <text x="103" y="11" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="7" fill="#22c55e" font-weight="600">DONE</text>
    </g>
    <g transform="translate(30, 152)">
      <text x="0" y="10" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#DDD6FE">Smoke tests</text>
      <rect x="86" y="2" width="34" height="12" rx="6" fill="#22c55e" opacity="0.2"/>
      <text x="103" y="11" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="7" fill="#22c55e" font-weight="600">PASS</text>
    </g>
  </g>

  <!-- ============ RIGHT: SPRINT 1 METRICS ============ -->

  <!-- Metric: slidev unstuck -->
  <g transform="translate(260, 60)">
    <rect width="300" height="65" rx="10" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.3"/>
    <rect x="2" y="2" width="296" height="61" rx="8" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="20" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="white" filter="url(#glowBox)">slidev</text>
    <text x="90" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">PVC stuck since deploy</text>
    <text x="90" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#927AFA">Missing storageClassName</text>
    <circle cx="268" cy="32" r="12" fill="url(#greenGrad)" opacity="0.85"/>
    <path d="M263 32 L267 36 L273 28" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Metric: SOGo -->
  <g transform="translate(260, 135)">
    <rect width="300" height="65" rx="10" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.3"/>
    <rect x="2" y="2" width="296" height="61" rx="8" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="20" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="white" filter="url(#glowBox)">SOGo</text>
    <text x="90" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">Namespace migrated</text>
    <text x="90" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#927AFA">demo → opendesk-edu</text>
    <circle cx="268" cy="32" r="12" fill="url(#iconGrad)" opacity="0.85"/>
    <text x="268" y="36" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="bold" fill="white">→</text>
  </g>

  <!-- Metric: 31 deployments -->
  <g transform="translate(260, 210)">
    <rect width="300" height="65" rx="10" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.3"/>
    <rect x="2" y="2" width="296" height="61" rx="8" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="20" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="white" filter="url(#glowBox)">31</text>
    <text x="90" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">Deployments audited</text>
    <text x="90" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#927AFA">StorageClass + namespace compliance</text>
    <rect x="258" y="14" width="22" height="22" rx="5" fill="url(#blueGrad)" opacity="0.85"/>
    <text x="269" y="29" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="bold" fill="white">✓</text>
  </g>

  <!-- Metric: Smoke tests -->
  <g transform="translate(260, 285)">
    <rect width="300" height="65" rx="10" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.3"/>
    <rect x="2" y="2" width="296" height="61" rx="8" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <text x="20" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="white" filter="url(#glowBox)">Smoke</text>
    <text x="90" y="30" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#DDD6FE" font-weight="500">All core services pass</text>
    <text x="90" y="46" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#927AFA">slidev · Nextcloud · SOGo · Element · Jitsi</text>
    <circle cx="268" cy="32" r="12" fill="url(#greenGrad)" opacity="0.85"/>
    <path d="M263 32 L267 36 L273 28" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ============ RIGHT COLUMN: SPRINT ROADMAP ============ -->

  <!-- Sprint 1 (complete) -->
  <g transform="translate(600, 60)">
    <rect width="260" height="52" rx="8" fill="url(#cardGrad)" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.5"/>
    <rect x="2" y="2" width="256" height="48" rx="6" fill="none" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.15"/>
    <circle cx="22" cy="26" r="10" fill="url(#greenGrad)" opacity="0.85"/>
    <text x="22" y="30" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="bold" fill="white">✓</text>
    <text x="42" y="22" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#22c55e">Sprint 1</text>
    <text x="42" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#DDD6FE">Infrastructure fixes</text>
  </g>

  <!-- Sprint 2 -->
  <g transform="translate(600, 122)">
    <rect width="260" height="52" rx="8" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="2" y="2" width="256" height="48" rx="6" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <circle cx="22" cy="26" r="10" fill="none" stroke="#927AFA" stroke-width="1.5" opacity="0.5"/>
    <text x="22" y="30" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#927AFA">2</text>
    <text x="42" y="22" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#DDD6FE">Sprint 2</text>
    <text x="42" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#927AFA">Service deployment gap</text>
  </g>

  <!-- Sprint 3 -->
  <g transform="translate(600, 184)">
    <rect width="260" height="52" rx="8" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="2" y="2" width="256" height="48" rx="6" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <circle cx="22" cy="26" r="10" fill="none" stroke="#927AFA" stroke-width="1.5" opacity="0.5"/>
    <text x="22" y="30" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#927AFA">3</text>
    <text x="42" y="22" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#DDD6FE">Sprint 3</text>
    <text x="42" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#927AFA">Monitoring &amp; alerting</text>
  </g>

  <!-- Sprint 4 -->
  <g transform="translate(600, 246)">
    <rect width="260" height="52" rx="8" fill="url(#cardGrad)" stroke="#571EFA" stroke-width="1" stroke-opacity="0.35"/>
    <rect x="2" y="2" width="256" height="48" rx="6" fill="none" stroke="#927AFA" stroke-width="0.5" stroke-opacity="0.15"/>
    <circle cx="22" cy="26" r="10" fill="none" stroke="#927AFA" stroke-width="1.5" opacity="0.5"/>
    <text x="22" y="30" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#927AFA">4</text>
    <text x="42" y="22" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#DDD6FE">Sprint 4</text>
    <text x="42" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#927AFA">Documentation &amp; handover</text>
  </g>

  <!-- ============ HEADLINE ============ -->

  <g transform="translate(260, 400)">
    <!-- openDesk Edu brand mark -->
    <g transform="translate(0, 0)" filter="url(#glowSoft)">
      <rect x="0" y="0" width="44" height="44" rx="10" fill="url(#iconGrad)"/>
      <text x="22" y="31" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="28" font-weight="bold" fill="white">D</text>
    </g>

    <!-- Headline -->
    <text x="58" y="30" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="white" letter-spacing="1" filter="url(#glowSoft)">Infrastructure Fixes</text>

    <!-- Subtitle -->
    <text x="58" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="400" fill="#927AFA" letter-spacing="0.5" opacity="0.85">Maui Cluster · Sprint 1 Complete</text>

    <!-- Separator -->
    <line x1="0" y1="70" x2="450" y2="70" stroke="#571EFA" stroke-width="1" opacity="0.4"/>

    <!-- Tagline -->
    <text x="0" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="400" fill="#DDD6FE" letter-spacing="0.5" opacity="0.7">Stuck PVC resolved · SOGo migrated · 31 storage classes audited</text>
    <text x="0" y="118" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="400" fill="#DDD6FE" letter-spacing="0.5" opacity="0.7">All smoke tests passing · Spints 2-4 in pipeline</text>

    <!-- Status badges -->
    <rect x="0" y="135" width="74" height="22" rx="11" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.4"/>
    <text x="37" y="150" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#22c55e" font-weight="600" opacity="0.7">DONE ✓</text>

    <rect x="84" y="135" width="86" height="22" rx="11" fill="none" stroke="#927AFA" stroke-width="1.5" opacity="0.4"/>
    <text x="127" y="150" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#927AFA" font-weight="600" opacity="0.7">NEXT: SPRINT 2</text>
  </g>

  <!-- openDesk wordmark bottom-right -->
  <g transform="translate(890, 570)">
    <text x="0" y="0" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="white" letter-spacing="2" opacity="0.5">openDesk</text>
    <text x="107" y="0" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="20" font-weight="300" fill="#927AFA" letter-spacing="5" opacity="0.5">EDU</text>
  </g>
</svg>
