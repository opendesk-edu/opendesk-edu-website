<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <title>openDesk Edu - SOPS Secret Management</title>
  <desc>Branded teaser image for the openDesk Edu SOPS secret management article featuring a dark purple gradient background, encryption key icon, grid pattern, and article title.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0014"/>
      <stop offset="50%" stop-color="#0d0020"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#571EFA"/>
      <stop offset="100%" stop-color="#927AFA"/>
    </linearGradient>
    <linearGradient id="accentLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#571EFA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#571EFA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentRight" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#927AFA" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#927AFA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#571EFA"/>
      <stop offset="100%" stop-color="#927AFA"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#927AFA"/>
      <stop offset="100%" stop-color="#571EFA"/>
    </linearGradient>
    <filter id="glowWide" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#571EFA" stroke-width="0.5" opacity="0.06"/>
    </pattern>
    <pattern id="dotGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#927AFA" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#dotGrid)"/>

  <!-- Edge accents -->
  <rect x="0" y="0" width="200" height="630" fill="url(#accentLeft)"/>
  <rect x="1000" y="0" width="200" height="630" fill="url(#accentRight)"/>
  <rect x="0" y="0" width="1200" height="2" fill="#571EFA" opacity="0.4"/>
  <rect x="0" y="628" width="1200" height="2" fill="#927AFA" opacity="0.2"/>

  <!-- Ambient glow -->
  <ellipse cx="200" cy="315" rx="250" ry="250" fill="#571EFA" opacity="0.06" filter="url(#glowWide)"/>
  <ellipse cx="1000" cy="315" rx="200" ry="200" fill="#927AFA" opacity="0.04" filter="url(#glowWide)"/>

  <!-- Encryption/lock icon background element -->
  <g transform="translate(60, 100)" opacity="0.12">
    <!-- Lock body -->
    <rect x="25" y="60" width="100" height="85" rx="8" fill="url(#lockGrad)"/>
    <!-- Shackle -->
    <path d="M 40,60 L 40,40 Q 40,15 75,15 Q 110,15 110,40 L 110,60" fill="none" stroke="url(#keyGrad)" stroke-width="8" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="75" cy="100" r="12" fill="#0a0014"/>
    <rect x="72" y="105" width="6" height="20" rx="3" fill="#0a0014"/>
  </g>

  <!-- D Icon -->
  <g transform="translate(60, 130)">
    <rect x="0" y="0" width="110" height="110" rx="22" fill="url(#iconGrad)" opacity="0.9"/>
    <text x="55" y="82" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="76" font-weight="bold" fill="white" opacity="0.95">D</text>
  </g>

  <!-- Brand wordmark -->
  <text x="200" y="194" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="white" letter-spacing="2">openDesk</text>
  <text x="200" y="222" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="300" fill="#DDD6FE" letter-spacing="10">EDUCATION</text>
  <line x1="200" y1="236" x2="380" y2="236" stroke="#571EFA" stroke-width="1" opacity="0.4"/>

  <!-- Article category badge -->
  <rect x="200" y="260" width="160" height="28" rx="14" fill="#571EFA" opacity="0.25"/>
  <text x="280" y="279" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" fill="#927AFA" letter-spacing="1">SECRET MANAGEMENT</text>

  <!-- Decorative line -->
  <line x1="200" y1="312" x2="950" y2="312" stroke="#571EFA" stroke-width="1.5" opacity="0.2"/>

  <!-- Article title -->
  <text x="200" y="340" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="white">
    <tspan x="200" dy="0">GitOps-Native Secret Management</tspan>
    <tspan x="200" dy="38" fill="#DDD6FE" font-weight="400" font-size="22">with SOPS and ArgoCD CMP Sidecar</tspan>
  </text>

  <!-- Short description -->
  <text x="200" y="420" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#927AFA" opacity="0.8">
    <tspan x="200" dy="0">Encrypt secrets in Git with age, decrypt at deploy time</tspan>
    <tspan x="200" dy="22">via ArgoCD Config Management Plugin — no Vault required.</tspan>
  </text>

  <!-- Tech tags -->
  <g transform="translate(200, 480)">
    <rect x="0" y="0" width="70" height="24" rx="12" fill="#571EFA" opacity="0.2"/>
    <text x="35" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">SOPS</text>
    <rect x="80" y="0" width="55" height="24" rx="12" fill="#571EFA" opacity="0.15"/>
    <text x="107" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">age</text>
    <rect x="145" y="0" width="90" height="24" rx="12" fill="#571EFA" opacity="0.15"/>
    <text x="190" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">ArgoCD</text>
    <rect x="245" y="0" width="65" height="24" rx="12" fill="#571EFA" opacity="0.15"/>
    <text x="277" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">GitOps</text>
    <rect x="320" y="0" width="135" height="24" rx="12" fill="#571EFA" opacity="0.15"/>
    <text x="387" y="16" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#927AFA" font-weight="500">Kubernetes</text>
  </g>

  <!-- Bottom decoration - encrypted lock pattern -->
  <g opacity="0.06">
    <!-- Data flow arrows/encryption visualization -->
    <rect x="180" y="540" width="16" height="16" rx="3" fill="#571EFA"/>
    <text x="188" y="553" text-anchor="middle" font-family="monospace" font-size="10" fill="white">E</text>
    <path d="M 200,548 L 215,548" stroke="#927AFA" stroke-width="1"/>
    <rect x="220" y="540" width="16" height="16" rx="3" fill="#571EFA"/>
    <text x="228" y="553" text-anchor="middle" font-family="monospace" font-size="10" fill="white">N</text>
    <path d="M 240,548 L 255,548" stroke="#927AFA" stroke-width="1"/>
    <rect x="260" y="540" width="16" height="16" rx="3" fill="#571EFA"/>
    <text x="268" y="553" text-anchor="middle" font-family="monospace" font-size="10" fill="white">C</text>
    <path d="M 280,548 L 295,548" stroke="#927AFA" stroke-width="1"/>
  </g>

  <!-- Decorative vertical lines -->
  <line x1="1000" y1="100" x2="1000" y2="530" stroke="#571EFA" stroke-width="0.5" opacity="0.06"/>
  <line x1="1050" y1="150" x2="1050" y2="500" stroke="#927AFA" stroke-width="0.5" opacity="0.05"/>
  <line x1="1100" y1="120" x2="1100" y2="480" stroke="#571EFA" stroke-width="0.5" opacity="0.04"/>

  <!-- Corner marks -->
  <path d="M 20,20 L 50,20 M 20,20 L 20,50" stroke="#571EFA" stroke-width="1.5" opacity="0.25" fill="none"/>
  <path d="M 1180,20 L 1150,20 M 1180,20 L 1180,50" stroke="#927AFA" stroke-width="1.5" opacity="0.2" fill="none"/>
  <path d="M 20,610 L 50,610 M 20,610 L 20,580" stroke="#571EFA" stroke-width="1.5" opacity="0.25" fill="none"/>
  <path d="M 1180,610 L 1150,610 M 1180,610 L 1180,580" stroke="#927AFA" stroke-width="1.5" opacity="0.2" fill="none"/>
</svg>
